# Configuration for cargo-deny (schema: cargo-deny 0.18+ / 0.19).
#
# Right-sized baseline (see PR #12). Several gates are intentionally relaxed with
# TODOs so CI is green AND meaningful today; ratchet stricter as the tree is
# cleaned up. Each relaxation is justified inline.

[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Don't block on "unmaintained" transitive crates (bincode, fxhash, instant,
# paste, rustls-pemfile). They're not vulnerabilities. TODO: prune as the dep
# tree shrinks. Ratchet back to "all" later.
unmaintained = "none"
# Transitive advisories with no clean fix yet. TRACKED — revisit each.
# (The rustls-webpki cert-validation advisories are CLEARED: the old rustls 0.21 /
# hyper-rustls stack is gone, and rustls-webpki is bumped to 0.103.13.)
ignore = [
    # rand unsoundness, only under a narrow condition (custom global logger +
    # rand::rng()) we do not hit. Bumping to rand 0.9 everywhere is a wide cascade.
    "RUSTSEC-2026-0097",
    # lru IterMut stacked-borrows UB. Transitive via moka (cache). No fixed
    # version in our range yet. TODO: bump moka/lru when available.
    "RUSTSEC-2026-0002",
]
# (thin-vec RUSTSEC-2026-0103 is CLEARED — the Boa JS engine that pulled it was
#  removed, dependency-budget Tier-3.)

[licenses]
# Allow-only model (cargo-deny 0.18+ denies anything not listed). Expanded to
# cover licenses actually present in the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "BSL-1.0", # Boost: error-code, clipboard-win, xxhash-rust (permissive)
    "MPL-2.0", # weak/file-level copyleft: cssparser + Servo CSS stack (our parser)
    "NCSA",    # libfuzzer-sys (permissive)
    "CDLA-Permissive-2.0", # webpki-roots (Mozilla root-cert data, permissive)
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
# Privacy/supply-chain bans, RESTORED now that the engine fetches via the in-house
# citadel-networking HTTPS client (rustls) instead of reqwest. These crates are no
# longer in the tree; the bans keep them out.
deny = [
    { name = "reqwest" },   # use citadel-networking::http
    { name = "ureq" },      # use citadel-networking::http
    { name = "curl" },      # use citadel-networking::http
    { name = "native-tls" }, # rustls only
    { name = "openssl" },    # rustls only
    { name = "hyper" },      # in-house HTTP/1.1 client instead
    { name = "hickory-resolver" }, # std/DoH resolution instead
]
skip = [
    { name = "windows-sys" },
    { name = "libc" },
    { name = "winapi" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
