# Configuration for cargo-deny (schema: cargo-deny 0.18+ / 0.19).
#
# Right-sized baseline (see PR #12). Several gates are intentionally relaxed with
# TODOs so CI is green AND meaningful today; ratchet stricter as the tree is
# cleaned up. Each relaxation is justified inline.

[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Don't block on "unmaintained" transitive crates (bincode, fxhash, instant,
# paste, rustls-pemfile). They're not vulnerabilities. TODO: prune as the dep
# tree shrinks. Ratchet back to "all" later.
unmaintained = "none"
# Transitive advisories with no clean fix yet. TRACKED — revisit each.
ignore = [
    # rand 0.8.5 unsoundness, only under a narrow condition (custom global logger
    # + rand::rng()) we do not hit. Bumping to rand 0.9 is a wide cascade. TODO.
    "RUSTSEC-2026-0097",
    # rustls-webpki: TLS name-constraint / CRL-parsing bugs. Pulled transitively
    # via rustls 0.21 + hyper-rustls 0.24 (crates/networking/src/connection.rs)
    # and hickory 0.26. Proper fix = bump the rustls stack to 0.23 / hyper-rustls
    # 0.27. TODO(security): prioritize — these are cert-validation issues.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    # thin-vec: UAF/double-free if an element's Drop panics. Transitive via
    # boa_engine 0.21 (JS engine). No fixed boa release yet. TODO: bump boa.
    "RUSTSEC-2026-0103",
]

[licenses]
# Allow-only model (cargo-deny 0.18+ denies anything not listed). Expanded to
# cover licenses actually present in the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "BSL-1.0", # Boost: error-code, clipboard-win, xxhash-rust (permissive)
    "MPL-2.0", # weak/file-level copyleft: cssparser + Servo CSS stack (our parser)
    "NCSA",    # libfuzzer-sys (permissive)
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
# Privacy-motivated bans (no reqwest/native-tls/openssl — "use our own
# networking") are DEFERRED: the browser engine currently fetches via reqwest
# with default-tls, which transitively pulls native-tls/openssl. TODO: migrate
# the engine fetch to citadel-networking + rustls, then re-add these hard bans.
deny = []
skip = [
    { name = "windows-sys" },
    { name = "libc" },
    { name = "winapi" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
